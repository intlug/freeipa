---
- name: Tear down FreeIPA demo VMs
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:

    - name: List currently defined VMs
      community.libvirt.virt:
        command: list_vms
        uri: "{{ libvirt_uri }}"
      register: defined_vms

    - name: Destroy running VMs
      community.libvirt.virt:
        name: "{{ vm.name }}"
        state: destroyed
        uri: "{{ libvirt_uri }}"
      loop: "{{ vms }}"
      loop_control:
        loop_var: vm
        label: "{{ vm.name }}"
      when: vm.name in defined_vms.list_vms
      ignore_errors: true

    - name: Undefine VMs
      community.libvirt.virt:
        name: "{{ vm.name }}"
        command: undefine
        uri: "{{ libvirt_uri }}"
      loop: "{{ vms }}"
      loop_control:
        loop_var: vm
        label: "{{ vm.name }}"
      when: vm.name in defined_vms.list_vms
      ignore_errors: true

    - name: Remove DHCP host mappings from libvirt network
      ansible.builtin.shell: >-
        virsh --connect {{ libvirt_uri }} net-update {{ libvirt_network }}
        delete ip-dhcp-host
        "<host mac='{{ vm.mac }}' name='{{ vm.fqdn }}' ip='{{ vm.ip }}'/>"
        --live --config
      loop: "{{ vms }}"
      loop_control:
        loop_var: vm
        label: "{{ vm.name }}"
      register: net_delete
      changed_when: net_delete.rc == 0
      failed_when:
        - net_delete.rc != 0
        - "'not found' not in net_delete.stderr"
        - "'No matching' not in net_delete.stderr"

    - name: Remove overlay disk images
      ansible.builtin.file:
        path: "{{ storage_dir }}/{{ vm.name }}.qcow2"
        state: absent
      loop: "{{ vms }}"
      loop_control:
        loop_var: vm
        label: "{{ vm.name }}"
      become: true

    - name: Remove cloud-init ISO images
      ansible.builtin.file:
        path: "{{ storage_dir }}/{{ vm.name }}-cidata.iso"
        state: absent
      loop: "{{ vms }}"
      loop_control:
        loop_var: vm
        label: "{{ vm.name }}"
      become: true

    - name: Remove cloud-init staging directory
      ansible.builtin.file:
        path: /tmp/freeipa-cidata
        state: absent
